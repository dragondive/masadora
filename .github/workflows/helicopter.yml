name: Update PlantUML diagram from external data
on:
  workflow_dispatch:
    inputs:
      plantuml-version:
        description: PlantUML version to use
        required: true
        default: latest
        type: string
      commit-data-files:
        description: Commit the intermediate CSV file and JSON file to the repository
        required: false
        type: boolean
        default: false

jobs:
  land-helicopter:
    name: Generate PlantUML diagram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Run PlantUML
        uses: dragondive/run-plantuml-local@main
